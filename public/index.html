<!DOCTYPE html>
<html>
<head>
  <title>Juego Multijugador REST</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      overflow: hidden;
    }
    #menu {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #game { display: none; margin-top: 10px; }
    #chat {
      position: absolute;
      top: 10px; right: 10px;
      width: 200px; height: 150px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ff0;
      overflow-y: auto;
      padding: 5px;
      font-size: 14px;
      display: none;
    }
    #chatInput {
      position: absolute;
      top: 170px; right: 10px;
      width: 200px;
      background: #222;
      color: white;
      border: 1px solid #555;
      display: none;
    }
    #jugadoresBox {
      position: absolute;
      top: 10px; right: 220px;
      width: 200px; height: 150px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #0f0;
      overflow-y: auto;
      padding: 5px;
      font-size: 14px;
      display: none;
    }
    #controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    #controls button {
      font-size: 24px;
      width: 60px;
      height: 60px;
      margin: 5px;
      border-radius: 10px;
      background: #222;
      color: white;
      border: 2px solid #555;
    }
    #btnJugadores {
      position: absolute;
      top: 330px; right: 10px;
      background: #222;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 5px 10px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h1>Start</h1>
    <input id="nombre" placeholder="Tu nombre" style="display:none;">
    <button id="btnStart">Comenzar</button>
    <p id="mensaje"></p>
  </div>

  <canvas id="game"></canvas>

  <div id="chat"></div>
  <input id="chatInput" placeholder="Escribe un mensaje...">
  <button id="btnJugadores">Jugadores</button>
  <div id="jugadoresBox"></div>

  <div id="controls">
    <div><button id="up">⬆️</button></div>
    <div>
      <button id="left">⬅️</button>
      <button id="down">⬇️</button>
      <button id="right">➡️</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
