<!DOCTYPE html>
<html>
<head>
  <title>Mi Google Raro</title>
  <style>
    body { font-family: Arial; text-align: center; }
    #buscador { margin-top: 20%; }
    #resultados { margin-top: 20px; }
    .arriba { margin-top: 20px !important; }
  </style>
</head>
<body>
  <div id="buscador">
    <input type="text" id="query" placeholder="Buscar..." />
    <button onclick="buscar()">Buscar</button>
  </div>
  <div id="resultados"></div>

  <script>
    async function buscar() {
      const q = document.getElementById("query").value;
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      // mover buscador arriba
      document.getElementById("buscador").classList.add("arriba");

      // mostrar resultados
      const div = document.getElementById("resultados");
      div.innerHTML = "";
      if (data.length === 0) {
        div.innerHTML = "<p>No se encontraron resultados</p>";
      } else {
        data.forEach(r => {
          div.innerHTML += `<p><a href="${r.url}" target="_blank">${r.titulo}</a></p>`;
        });
      }
    }
  </script>
</body>
</html>
