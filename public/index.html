<!DOCTYPE html>
<html>
<head>
  <title>Juego</title>
  <style>
    #menu {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }
    #game { display: none; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>Start</h1>
    <input id="nombre" placeholder="Tu nombre" style="display:none;">
    <button id="btnStart">Comenzar</button>
    <p id="mensaje"></p>
  </div>
  <canvas id="game"></canvas>
  <script src="script.js"></script>
</body>
</html>
