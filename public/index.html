<!DOCTYPE html>
<html>
<head>
  <title>Chat Raro</title>
  <style>
    body { font-family: Arial; text-align: center; }
    #login { margin-top: 20%; }
    #chat { display: none; margin-top: 20px; }
    #mensajes { border: 1px solid #ccc; height: 300px; overflow-y: scroll; text-align: left; padding: 10px; }
  </style>
</head>
<body>
  <div id="login">
    <h2>Ingresa tu nombre</h2>
    <input type="text" id="nombre" placeholder="Tu nombre"/>
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="chat">
    <h2>Chat</h2>
    <div id="mensajes"></div>
    <input type="text" id="texto" placeholder="Escribe un mensaje"/>
    <button onclick="enviar()">Enviar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
