<!DOCTYPE html>
<html>
<head>
  <title>Mi Google Raro</title>
  <style>
    body { font-family: Arial; text-align: center; }

    #resultados { margin-top: 20px; }

<body>
  <div id="buscador">
    <input type="text" id="query" placeholder="Buscar..." oninput="sugerir()"/>

    <div id="sugerencias"></div>
  </div>
  <div id="resultados"></div>

  <script src="script.js"></script>
</body>
</html>
